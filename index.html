<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hikamaninder - ヒカマー登録＆一覧</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; }
        h1 { text-align: center; color: #ff5a5f; margin-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"], input[type="url"], input[type="file"] {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;
        }
        .required { color: red; font-size: 0.8em; margin-left: 5px; }
        button {
            width: 100%; padding: 12px; background-color: #ff5a5f; color: white; border: none;
            border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px;
        }
        button:hover { background-color: #e0484d; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; }

        /* ユーザー一覧（タイムライン）のスタイル */
        .timeline-container { max-width: 600px; margin: 0 auto; }
        .timeline-title { text-align: center; color: #333; margin-bottom: 20px; }
        .user-card {
            background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 15px; display: flex; align-items: center; gap: 20px;
        }
        .user-avatar {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #ff5a5f; background: #eee;
        }
        .user-info { flex-grow: 1; }
        .user-name { font-size: 1.2em; font-weight: bold; margin: 0 0 10px 0; color: #111; }
        .sns-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .sns-btn {
            display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 0.85em;
            text-decoration: none; font-weight: bold; color: white; transition: background 0.2s;
        }
        .btn-x { background-color: #111; }         .btn-x:hover { background-color: #333; }
        .btn-yt { background-color: #ff0000; }     .btn-yt:hover { background-color: #cc0000; }
        .btn-insta { background-color: #e1306c; }  .btn-insta:hover { background-color: #b82354; }
    </style>
</head>
<body>

<div class="container">
    <h1>hikamaninder</h1>
    <p style="text-align: center;">ヒカマーの輪を広げよう！</p>
    
    <form id="registerForm">
        <div class="form-group">
            <label>ユーザー名 <span class="required">※必須</span></label>
            <input type="text" id="username" required>
        </div>

        <div class="form-group">
            <label>パスワード <span class="required">※必須</span></label>
            <input type="password" id="password" required>
        </div>

        <div class="form-group">
            <label>プロフィール画像 <span class="required">※必須</span></label>
            <input type="file" id="profileImage" accept="image/*" required>
        </div>

        <div class="form-group">
            <label>X (Twitter) リンク <span class="required">※必須</span></label>
            <input type="url" id="xLink" placeholder="https://x.com/your_id" required>
        </div>

        <div class="form-group">
            <label>YouTube リンク (任意)</label>
            <input type="url" id="ytLink" placeholder="https://youtube.com/...">
        </div>

        <div class="form-group">
            <label>Instagram リンク (任意)</label>
            <input type="url" id="instaLink" placeholder="https://instagram.com/your_id">
        </div>

        <button type="submit" id="submitBtn">登録する</button>
        <div id="message"></div>
    </form>
</div>

<div class="timeline-container">
    <h2 class="timeline-title">登録済みのヒカマーたち</h2>
    <div id="userList">
        <p style="text-align: center; color: #888;">読み込み中ブンブン...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    // データをリアルタイム監視して取得するために onSnapshot, query, orderBy を追加
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCwhHspaG94goiCIjVj3h-Un5pBK3JTjMU",
      authDomain: "soulkin-aa3b7.firebaseapp.com",
      databaseURL: "https://soulkin-aa3b7-default-rtdb.firebaseio.com",
      projectId: "soulkin-aa3b7",
      storageBucket: "soulkin-aa3b7.firebasestorage.app",
      messagingSenderId: "358331064206",
      appId: "1:358331064206:web:d7760ea0919259418a4edf",
      measurementId: "G-S5Z8TTWYE2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // XSS対策：HTMLエスケープ関数
    function escapeHTML(str) {
        if (!str) return "";
        return str.replace(/[&<>'"]/g, function(match) {
            const escapeMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
            return escapeMap[match];
        });
    }

    // 画像をBase64に変換
    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    // パスワードのハッシュ化
    async function hashPassword(password) {
        const msgUint8 = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 【新機能】Firestoreからユーザー一覧をリアルタイムで取得して表示する処理
    // 登録された時間が新しい順（createdAtの降順）に並べ替えます
    const q = query(collection(db, "users"), orderBy("createdAt", "desc"));
    
    onSnapshot(q, (querySnapshot) => {
        const userListDiv = document.getElementById('userList');
        userListDiv.innerHTML = ""; // 一旦表示をクリア

        if (querySnapshot.empty) {
            userListDiv.innerHTML = `<p style="text-align: center; color: #888;">まだ登録者がいません。最初のヒカマーになろう！</p>`;
            return;
        }

        querySnapshot.forEach((doc) => {
            const userData = doc.data();
            
            // 安全のために、表示前にも再度サニタイズ（念のため）
            const name = escapeHTML(userData.username);
            const img = userData.profileImageBase64; // Base64データなのでそのままsrcに使える
            const xUrl = escapeHTML(userData.socialLinks?.x);
            const ytUrl = escapeHTML(userData.socialLinks?.youtube);
            const instaUrl = escapeHTML(userData.socialLinks?.instagram);

            // ユーザーカードのHTMLを組み立て
            let cardHtml = `
                <div class="user-card">
                    <img src="${img}" alt="${name}の画像" class="user-avatar" onerror="this.src='https://placehold.co/80'">
                    <div class="user-info">
                        <p class="user-name">${name}</p>
                        <div class="sns-links">
                            <a href="${xUrl}" target="_blank" rel="noopener noreferrer" class="sns-btn btn-x">X (Twitter)</a>
            `;

            // YouTubeとインスタは任意項目なので、データがある場合のみリンクボタンを表示する
            if (ytUrl) {
                cardHtml += `<a href="${ytUrl}" target="_blank" rel="noopener noreferrer" class="sns-btn btn-yt">YouTube</a>`;
            }
            if (instaUrl) {
                cardHtml += `<a href="${instaUrl}" target="_blank" rel="noopener noreferrer" class="sns-btn btn-insta">Instagram</a>`;
            }

            cardHtml += `
                        </div>
                    </div>
                </div>
            `;

            userListDiv.insertAdjacentHTML('beforeend', cardHtml);
        });
    }, (error) => {
        console.error("データ取得エラー:", error);
        document.getElementById('userList').innerHTML = `<p style="text-align: center; color: red;">データの取得に失敗しました。</p>`;
    });

    // フォーム送信（ユーザー登録）の処理
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        
        submitBtn.disabled = true;
        messageDiv.style.color = "black";
        messageDiv.textContent = "登録中ブンブンハロー...";

        try {
            const rawUsername = document.getElementById('username').value;
            const rawXLink = document.getElementById('xLink').value;
            const rawYtLink = document.getElementById('ytLink').value;
            const rawInstaLink = document.getElementById('instaLink').value;
            const rawPassword = document.getElementById('password').value;
            const imageFile = document.getElementById('profileImage').files[0];

            if (imageFile && imageFile.size > 1024 * 1024) {
                throw new Error("画像サイズは1MB以下にしてください。");
            }

            const username = escapeHTML(rawUsername);
            const xLink = escapeHTML(rawXLink);
            const ytLink = escapeHTML(rawYtLink);
            const instaLink = escapeHTML(rawInstaLink);
            const hashedPassword = await hashPassword(rawPassword);
            const base64Image = await fileToBase64(imageFile);

            await addDoc(collection(db, "users"), {
                username: username,
                passwordHash: hashedPassword,
                profileImageBase64: base64Image,
                socialLinks: { x: xLink, youtube: ytLink, instagram: instaLink },
                createdAt: new Date().toISOString()
            });

            messageDiv.style.color = "green";
            messageDiv.textContent = "登録完了！";
            document.getElementById('registerForm').reset();

        } catch (error) {
            console.error("エラー: ", error);
            messageDiv.style.color = "red";
            messageDiv.textContent = "エラーが発生しました: " + error.message;
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
